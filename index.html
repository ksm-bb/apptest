    // ==========================================
    // 🎨 ตัวแปรสีหลัก (COLORS Object)
    // ==========================================
    const COLORS = {
      blue: '#e9f4fa',       
      pink: '#fdd9ef',       
      purple: '#eed5f8',     
      orange: '#ffe9ef',     
      bg: '#fffcf7',         
      white: '#FFFFFF',      
      pinkDeep: '#ffb8e1',   
      textMain: '#827397',   
      textSoft: '#a89cb5',   
      blueDeep: '#8FA4B5',   
      purpleDeep: '#a38ab5', 
      orangeDeep: '#e3a1c0', 
    };

    const FluffyCloud = React.memo(({ top, left, right, bottom, scale = 1, opacity = 0.7, delay = '0s', reverse = false }) => (
      <div className="absolute pointer-events-none drop-shadow-sm z-0" style={{ top, left, right, bottom, opacity, transform: `scale(${scale})` }}>
        <div className={reverse ? 'animate-float-reverse' : 'animate-float'} style={{ animationDelay: delay }}>
          <div className="relative w-40 h-16">
            <div className="absolute bottom-0 left-4 w-32 h-10 bg-white/90 rounded-full"></div>
            <div className="absolute bottom-2 left-2 w-14 h-14 bg-white/90 rounded-full"></div>
            <div className="absolute bottom-5 left-10 w-16 h-16 bg-white/90 rounded-full"></div>
            <div className="absolute bottom-1 right-2 w-14 h-14 bg-white/90 rounded-full"></div>
          </div>
        </div>
      </div>
    ));

    const DynamicBackground = React.memo(() => (
      <div className="fixed inset-0 overflow-hidden pointer-events-none z-0">
        <div className="absolute top-[10%] left-[-10%] w-72 h-72 rounded-full blur-[90px] opacity-40 animate-float" style={{ backgroundColor: COLORS.pink }}></div>
        <div className="absolute bottom-[10%] right-[-10%] w-80 h-80 rounded-full blur-[100px] opacity-30 animate-float-reverse" style={{ backgroundColor: COLORS.blue }}></div>
        <div className="absolute top-[40%] right-[10%] w-48 h-48 rounded-full blur-[80px] opacity-20 animate-float" style={{ backgroundColor: COLORS.purple }}></div>
        <FluffyCloud top="8%" left="-5%" scale={1.5} opacity={0.6} delay="0s" />
        <FluffyCloud top="35%" left="-15%" scale={2.5} opacity={0.3} delay="2.5s" />
        <FluffyCloud bottom="20%" left="5%" scale={1.6} opacity={0.6} delay="3s" />
        <FluffyCloud top="50%" right="-5%" scale={1.8} opacity={0.5} delay="1s" reverse={true} />
      </div>
    ));

    const Header = React.memo(({ isAdmin, setIsAdmin, setShowAuthModal, handleImageUpload, profileImage }) => (
      <div className="px-5 pt-6 pb-2 relative z-10">
        <div className="bg-white/40 backdrop-blur-md rounded-[32px] p-4 shadow-xl shadow-[#e9f4fa]/50 border border-white/50 flex items-center justify-between h-20 relative overflow-hidden group">
          <div className="absolute left-6 top-1/2 -translate-y-1/2 w-24 h-8 bg-[#fdd9ef]/60 blur-xl rounded-full"></div>
          <div className="flex flex-col justify-center ml-2 relative z-10">
            <div className="flex items-center gap-1">
              <h1 className="text-2xl font-black italic tracking-tighter flex">
                {"องุ่นหวาน".split('').map((char, index) => (
                  <span key={index} className="bg-gradient-to-br from-[#827397] to-[#a38ab5] bg-clip-text text-transparent drop-shadow-sm inline-block animate-text-wave" style={{ animationDelay: `${index * 0.1}s` }}>{char}</span>
                ))}
              </h1>
              <button onClick={() => isAdmin ? setIsAdmin(false) : setShowAuthModal(true)} className={`px-1.5 py-0.5 ml-1 rounded-full text-[7px] font-black uppercase tracking-widest border shadow-sm transition-all active:scale-95 ${isAdmin ? 'bg-white/60 text-[#827397] border-[#b5a8c2]' : 'bg-gray-100/80 text-gray-400 border-gray-200'}`}>
                {isAdmin ? 'Admin' : 'Guest'}
              </button>
            </div>
            <div className="flex items-center gap-1.5 opacity-70">
              <div className="w-3 h-[1px]" style={{ backgroundColor: COLORS.pinkDeep }}></div>
              <p className="text-[8px] font-black tracking-[0.5em] uppercase" style={{ color: COLORS.purpleDeep }}>SUBSCRIPTIONS</p>
            </div>
          </div>
          <div onClick={isAdmin ? handleImageUpload : undefined} className={`w-16 h-16 rounded-[1.25rem] bg-white border-2 border-white flex items-center justify-center relative overflow-hidden transition-transform ${isAdmin ? 'cursor-pointer hover:scale-105 active:scale-95' : ''}`}>
            {profileImage ? (
              <img src={profileImage} alt="Profile" className="w-full h-full object-cover" />
            ) : (
              <>
                <div className="absolute inset-0 opacity-40" style={{ background: `linear-gradient(to top right, ${COLORS.pink}, ${COLORS.blue})` }}></div>
                <span className="text-2xl relative z-10 select-none">🐰</span>
              </>
            )}
          </div>
        </div>
      </div>
    ));

    const CheckDateCard = React.memo(({ checkDays, dueInXTasksLength, onOpenDaysModal, onCardClick, isActive }) => (
      <div onClick={onCardClick} className={`bg-white/80 backdrop-blur-sm rounded-[28px] p-4 flex flex-col justify-between relative overflow-hidden transition-all cursor-pointer h-full group ${isActive ? 'border-2 border-[#ffb8e1] shadow-md shadow-[#ffb8e1]/30 bg-[#fffcf7] scale-[0.98]' : 'border border-white shadow-lg shadow-[#eed5f8]/30 hover:shadow-[#eed5f8]/50 hover:scale-[1.01]'}`}>
        <div className={`absolute -right-2 -bottom-4 transition-transform duration-500 pointer-events-none ${isActive ? 'scale-110 opacity-20' : 'opacity-10 group-hover:scale-110 group-hover:-rotate-6'}`} style={{ color: COLORS.textMain }}><IconCalendar size={75} /></div>
        {isActive && (
            <div className="absolute top-4 left-4 flex items-center justify-center">
              <span className="animate-ping absolute inline-flex h-2 w-2 rounded-full bg-[#ffb8e1] opacity-75"></span>
              <span className="relative inline-flex rounded-full h-1.5 w-1.5 bg-[#e3a1c0]"></span>
            </div>
        )}
        <div className="flex justify-between items-start relative z-10">
            <div className={`flex flex-col ${isActive ? 'ml-3' : 'ml-0'} transition-all`}>
                <span className="text-[9px] font-black text-[#a89cb5] uppercase tracking-wider mb-0.5">Advance</span>
                <span className="text-[11px] font-black text-[#827397]">เช็ครายการต่ออายุเมล</span>
            </div>
            <button onClick={(e) => { e.stopPropagation(); onOpenDaysModal(); }} className="bg-white/90 backdrop-blur-sm px-2.5 py-1 rounded-full text-[9px] font-black shadow-sm border border-[#ffb8e1] text-[#827397] hover:bg-[#fffcf7] active:scale-95 transition-all flex items-center gap-1 z-20" title="เปลี่ยนจำนวนวัน">อีก {checkDays} วัน <span className="text-[7px] opacity-60 ml-0.5">▾</span></button>
        </div>
        <div className="relative z-10 mt-1 flex items-baseline gap-1.5">
            <span className="text-[11px] font-bold text-[#827397]">พบ</span>
            <span className="text-3xl font-black leading-none" style={{ color: COLORS.pinkDeep }}>{dueInXTasksLength}</span>
            <span className="text-[11px] font-bold text-[#827397]">รายการ</span>
        </div>
      </div>
    ));

    const OverdueCard = React.memo(({ overdueTasksLength, triggerBounce, isBouncing }) => (
      <div onClick={triggerBounce} className={`bg-white/80 backdrop-blur-sm rounded-[28px] p-2 flex flex-col items-center justify-center shadow-lg shadow-orange-500/10 border border-white h-full relative overflow-hidden transition-all duration-300 cursor-pointer ${isBouncing ? 'scale-95' : 'hover:scale-[1.02]'}`}>
        <div className="absolute top-2 left-1/2 -translate-x-1/2 px-2 py-0.5 rounded-md text-[7px] font-black bg-white shadow-sm border border-orange-200 uppercase tracking-wider whitespace-nowrap z-10 text-orange-400 flex items-center gap-1"><IconAlertTriangle size={8} /> เลยกำหนด</div>
        <div className="relative mt-5 flex flex-col items-center">
           <div className="relative">
             <div className="absolute inset-0 blur-lg rounded-full opacity-50 scale-125 bg-orange-300"></div>
             <div className="w-12 h-12 rounded-full bg-white flex flex-col items-center justify-center shadow-[inset_0_2px_8px_rgba(0,0,0,0.02)] border-2 border-orange-100 relative z-10">
                <span className="text-2xl font-black leading-none text-orange-400">{overdueTasksLength}</span>
             </div>
           </div>
           <span className="text-[8px] font-black opacity-70 uppercase mt-2 relative z-10 text-orange-400">เมล</span>
        </div>
      </div>
    ));

    // ==========================================
    // 🃏 COMPONENT: TaskCard (การ์ดรายการ)
    // ==========================================
    const TaskCard = React.memo(({ task, isAdmin, onEdit, onToggleDoing, onToggleStatus, onToggleCancel }) => {
      
      const today = new Date();
      today.setHours(0,0,0,0);
      const due = new Date(task.dueDate);
      due.setHours(0,0,0,0);
      const daysDiff = Math.ceil((due - today) / (1000 * 60 * 60 * 24));

      // กำหนด Badge สีและข้อความตามสถานะ
      let statusBadge = null;
      if (task.status === 'done') {
          statusBadge = <span className="text-[9px] font-bold bg-gray-50 text-gray-400 px-2 py-0.5 rounded-full border border-gray-100">ต่ออายุแล้ว</span>;
      } else if (task.status === 'cancelled') {
          statusBadge = <span className="text-[9px] font-bold bg-gray-50 text-gray-400 px-2 py-0.5 rounded-full border border-gray-100">ไม่ต่ออายุ</span>;
      } else if (daysDiff < 0) {
          statusBadge = <span className="text-[9px] font-bold bg-orange-50 text-orange-500 px-2 py-0.5 rounded-full animate-pulse border border-orange-200">เลยกำหนดมาแล้ว {Math.abs(daysDiff)} วัน</span>;
      } else if (daysDiff >= 0 && daysDiff <= 3) {
          statusBadge = <span className="text-[9px] font-bold bg-yellow-50 text-[#827397] px-2 py-0.5 rounded-full border border-[#eed5f8]">ถึงกำหนดชำระ {daysDiff > 0 ? `(${daysDiff} วัน)` : ''}</span>;
      } else {
          statusBadge = <span className="text-[9px] font-bold bg-[#e9f4fa] text-[#8FA4B5] px-2 py-0.5 rounded-full border border-[#e9f4fa]">อีก {daysDiff} วันถึงกำหนด</span>;
      }

      // ระบบเลือก Icon Component ตามสถานะและจำนวนวัน
      let StatusIcon = IconStatusDone; 
      let iconColor = "text-[#8FA4B5]"; // สีตั้งต้น

      if (task.status === 'done') {
          StatusIcon = IconStatusDone; 
          iconColor = "text-[#827397]";
      } else if (task.status === 'doing') {
          StatusIcon = IconStatusDoing; 
          iconColor = "text-[#e3a1c0]";
      } else if (task.status === 'cancelled') {
          StatusIcon = IconStatusCancel; 
          iconColor = "text-[#a89cb5]";
      } else if (task.status === 'todo') {
          if (daysDiff < 0) {
              StatusIcon = IconStatusOverdue; 
              iconColor = "text-orange-400";
          } else if (daysDiff >= 0 && daysDiff <= 3) {
              StatusIcon = IconStatusDue; 
              iconColor = "text-yellow-400";
          } else {
              StatusIcon = IconStatusDone; 
              iconColor = "text-[#ffb8e1]"; // สีเขียวอ่อน/ชมพูสำหรับอันที่ยังไม่ถึงเวลา
          }
      }

      const handleToggleDone = (e) => {
          e.stopPropagation();
          onToggleStatus(e, task);
      };

      return (
        <div className="flex items-center gap-2 mb-2 w-full">
          
          {/* ส่วนแสดงไอคอน SVG */}
          <div className={`w-[52px] h-[52px] flex-shrink-0 flex items-center justify-center relative z-20 ${iconColor}`}>
              <StatusIcon className="w-full h-full object-contain animate-float-icon" />
          </div>

          <div onClick={() => isAdmin && onEdit(task)} className={`relative flex-1 rounded
